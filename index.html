<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantry Chef | Reduce Food Waste with AI</title>
    
    <!-- Meta Tags -->
    <meta name="title" content="Pantry Chef | Reduce Food Waste with AI" />
    <meta name="description" content="Turn your leftovers into gourmet meals with AI." />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
      .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .dark .glass-panel { background: rgba(30, 41, 59, 0.85); }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      
      #error-display {
        display: none;
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 10000;
        padding: 2rem;
        color: #ef4444;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      .dark #error-display { background: #0f172a; }
    </style>

    <script>
      window.process = { env: { API_KEY: "" } };
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              chef: {
                orange: '#FF6B6B',
                yellow: '#FFD93D',
                green: '#6BCB77',
                dark: '#2C3E50',
                light: '#F7F7F7'
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.11/babel.min.js"></script>

    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.46.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
  </head>
  <body class="bg-gray-50 text-gray-900 transition-colors duration-300">
    <div id="root"></div>
    <div id="error-display"></div>

    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const display = document.getElementById('error-display');
        display.style.display = 'block';
        display.innerHTML = `
          <h1 style="font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem;">Application Initialization Failed</h1>
          <p style="margin-bottom: 0.5rem;"><strong>Error:</strong> ${msg}</p>
          <p style="font-size: 0.8rem; opacity: 0.7;">${url} [${lineNo}:${columnNo}]</p>
          <button onclick="location.reload()" style="margin-top: 2rem; background: #FF6B6B; color: white; padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; cursor: pointer;">Retry Loading</button>
        `;
        return false;
      };
    </script>

    <script type="text/babel" data-type="module" data-presets="typescript,react" src="index.tsx"></script>
  </body>
</html>
