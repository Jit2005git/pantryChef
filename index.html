<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantry Chef | Reduce Food Waste with AI</title>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="Pantry Chef | Reduce Food Waste with AI" />
    <meta name="description" content="Turn your leftovers into gourmet meals. Scan your fridge and get instant AI-powered recipe suggestions." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pantry Chef | Your AI Kitchen Assistant" />
    <meta property="og:description" content="Reduce food waste by generating delicious recipes from ingredients you already have." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200&h=630&q=80" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Pantry Chef | Your AI Kitchen Assistant" />
    <meta property="twitter:description" content="Turn your leftovers into gourmet meals with AI." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200&h=630&q=80" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .dark .glass-panel {
        background: rgba(30, 41, 59, 0.85);
      }
      /* Custom scrollbar for history sidebar */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              chef: {
                orange: '#FF6B6B',
                yellow: '#FFD93D',
                green: '#6BCB77',
                dark: '#2C3E50',
                light: '#F7F7F7'
              }
            }
          }
        }
      }
    </script>
    
    <!-- Babel for in-browser JSX/TSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3"
      }
    }
    </script>

  <body class="bg-gray-50 text-gray-900 transition-colors duration-300">
    <div id="root"></div>

    <!-- Shim to allow process.env usage in the browser -->
    <script>
      window.process = { 
        env: { 
          // Netlify environment variables can be injected here via Snippet Injection if needed,
          // or they will be read by your build process if you choose to add one later.
          API_KEY: undefined 
        } 
      };
    </script>

    <!-- Main entry point transpiled by Babel -->
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="index.tsx"></script>
  </body>
