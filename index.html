<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantry Chef | Reduce Food Waste with AI</title>
    
    <!-- Meta Tags -->
    <meta name="title" content="Pantry Chef | Reduce Food Waste with AI" />
    <meta name="description" content="Turn your leftovers into gourmet meals with AI." />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      body { font-family: 'Poppins', sans-serif; }
      .glass-panel {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .dark .glass-panel { background: rgba(30, 41, 59, 0.85); }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Error overlay if initialization fails */
      #error-display {
        display: none;
        position: fixed;
        inset: 0;
        background: white;
        z-index: 9999;
        padding: 2rem;
        color: #ef4444;
        font-family: monospace;
      }
    </style>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              chef: {
                orange: '#FF6B6B',
                yellow: '#FFD93D',
                green: '#6BCB77',
                dark: '#2C3E50',
                light: '#F7F7F7'
              }
            }
          }
        }
      }
    </script>
    
    <!-- Babel Standalone for in-browser JSX/TS transpilation -->
    <script src="https://unpkg.com/@babel/standalone@7.23.11/babel.min.js"></script>

    <!-- Optimized Import Map for Production -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.46.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
  </head>
  <body class="bg-gray-50 text-gray-900 transition-colors duration-300">
    <div id="root"></div>
    <div id="error-display"></div>

    <script>
      // Global error handler to help debug blank pages
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const display = document.getElementById('error-display');
        display.style.display = 'block';
        display.innerHTML = `<h3>Application Error</h3><p>${msg}</p><small>${url} [${lineNo}:${columnNo}]</small>`;
        return false;
      };

      // Environment Shim
      window.process = { 
        env: { 
          // Netlify typically uses build plugins to inject variables, 
          // but for this standalone setup, we ensure it's defined.
          API_KEY: window.NETLIFY_API_KEY || undefined 
        } 
      };
    </script>

    <!-- Main Entry -->
    <script type="text/babel" data-type="module" data-presets="typescript,react" src="index.tsx"></script>
  </body>
</html>
