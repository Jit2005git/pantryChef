<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pantry Chef | AI Waste Reducer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      body { 
        font-family: 'Poppins', sans-serif; 
        margin: 0; 
        padding: 0;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }
      #root { min-height: 100vh; }
      
      /* Initial loader before React mounts */
      #initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f9fafb;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #FF6B6B;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      /* Global utility for responsive buttons */
      .btn-responsive {
        @apply px-3 py-2 sm:px-4 sm:py-3 text-[10px] sm:text-xs font-bold uppercase tracking-widest;
      }
    </style>

    <script>
      // Initialize environment
      window.process = { env: { API_KEY: "" } };
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            screens: { 'xs': '375px' },
            colors: {
              chef: {
                orange: '#FF6B6B',
                yellow: '#FFD93D',
                green: '#6BCB77',
                dark: '#2C3E50',
                light: '#F7F7F7'
              }
            }
          }
        }
      }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.11/babel.min.js"></script>

    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.46.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
  </head>
  <body class="bg-gray-50 text-gray-900 transition-colors duration-300">
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 700; color: #6b7280; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;">
          Chef is Preparing...
        </p>
      </div>
    </div>
    
    <div id="error-display" style="display:none; position:fixed; inset:0; background:#fff; z-index:99999; padding:2rem; color:#ef4444; font-family:monospace;"></div>

    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error(error);
        const display = document.getElementById('error-display');
        display.style.display = 'block';
        display.innerHTML = `
          <h2 style="margin-bottom:1rem">App Crash</h2>
          <p><strong>Message:</strong> ${msg}</p>
          <p style="font-size:12px; opacity:0.6">${url}:${lineNo}</p>
          <button onclick="location.reload()" style="margin-top:1rem; padding:8px 16px; background:#FF6B6B; color:#fff; border:none; border-radius:4px; cursor:pointer">Reload Page</button>
        `;
        return false;
      };
    </script>

    <script type="text/babel" data-type="module" data-presets="typescript,react" src="index.tsx"></script>
  </body>
</html>
